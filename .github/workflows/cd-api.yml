name: CD — API

on:
  push:
    branches: [staging, prod]
    paths:
      - 'apps/api/**'
      - 'packages/types/**'
      - '.github/workflows/cd-api.yml'

concurrency:
  group: cd-api-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGION: europe-west1
  PROJECT_ID: vp-dietetic-center
  REGISTRY: europe-west1-docker.pkg.dev/vp-dietetic-center/vp-dietetic

jobs:
  deploy:
    name: Build & Deploy API (${{ github.ref_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    environment: ${{ github.ref_name == 'prod' && 'production' || 'staging' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "prod" ]]; then
            echo "service=prod-api" >> $GITHUB_OUTPUT
            echo "tag=prod" >> $GITHUB_OUTPUT
          else
            echo "service=staging-api" >> $GITHUB_OUTPUT
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        id: build
        run: |
          IMAGE="${{ env.REGISTRY }}/api:${{ github.sha }}"
          IMAGE_ENV="${{ env.REGISTRY }}/api:${{ steps.env.outputs.tag }}"

          docker build \
            --target production \
            --tag "$IMAGE" \
            --tag "$IMAGE_ENV" \
            --file apps/api/Dockerfile \
            .

          docker push "$IMAGE"
          docker push "$IMAGE_ENV"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update "${{ steps.env.outputs.service }}" \
            --image "${{ steps.build.outputs.image }}" \
            --region "${{ env.REGION }}"

      - name: Run DB migrations
        run: |
          gcloud run jobs execute "${{ steps.env.outputs.service }}-migrate" \
            --region "${{ env.REGION }}" \
            --wait 2>/dev/null || echo "Migration job not configured — skipping"

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe "${{ steps.env.outputs.service }}" \
            --region "${{ env.REGION }}" --format="value(status.url)")
          echo "Deployed to: ${URL}"
          curl -sf "${URL}/api/health" || echo "Health check pending..."
