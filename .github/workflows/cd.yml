name: CD

on:
  push:
    branches: [staging, prod]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - staging
          - prod

env:
  REGION: europe-west1
  PROJECT_ID: vp-dietetic-center
  REGISTRY: europe-west1-docker.pkg.dev/vp-dietetic-center/vp-dietetic
  TARGET_ENV: ${{ inputs.environment || github.ref_name }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: filter
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "api=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "terraform=false" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            echo "api=$(echo "$CHANGED" | grep -q -E '^(apps/api/|packages/types/)' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "frontend=$(echo "$CHANGED" | grep -q -E '^(apps/frontend/|packages/types/)' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "terraform=$(echo "$CHANGED" | grep -q '^infra/terraform/' && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

  deploy-api:
    name: Build & Deploy API (${{ inputs.environment || github.ref_name }})
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    concurrency:
      group: cd-api-${{ inputs.environment || github.ref_name }}
      cancel-in-progress: false

    environment: ${{ (inputs.environment || github.ref_name) == 'prod' && 'production' || 'staging' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        id: env
        run: |
          if [[ "${{ env.TARGET_ENV }}" == "prod" ]]; then
            echo "service=prod-api" >> $GITHUB_OUTPUT
            echo "tag=prod" >> $GITHUB_OUTPUT
          else
            echo "service=staging-api" >> $GITHUB_OUTPUT
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        id: build
        run: |
          IMAGE="${{ env.REGISTRY }}/api:${{ github.sha }}"
          IMAGE_ENV="${{ env.REGISTRY }}/api:${{ steps.env.outputs.tag }}"

          docker build \
            --target production \
            --tag "$IMAGE" \
            --tag "$IMAGE_ENV" \
            --file apps/api/Dockerfile \
            .

          docker push "$IMAGE"
          docker push "$IMAGE_ENV"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update "${{ steps.env.outputs.service }}" \
            --image "${{ steps.build.outputs.image }}" \
            --region "${{ env.REGION }}"

      - name: Run DB migrations
        run: |
          gcloud run jobs update "${{ steps.env.outputs.service }}-migrate" \
            --image "${{ steps.build.outputs.image }}" \
            --region "${{ env.REGION }}"

          gcloud run jobs execute "${{ steps.env.outputs.service }}-migrate" \
            --region "${{ env.REGION }}" \
            --wait

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe "${{ steps.env.outputs.service }}" \
            --region "${{ env.REGION }}" --format="value(status.url)")
          echo "Deployed to: ${URL}"
          curl -sf "${URL}/api/health" || echo "Health check pending..."

  deploy-frontend:
    name: Build & Deploy Frontend (${{ inputs.environment || github.ref_name }})
    needs: [changes, deploy-api]
    if: >-
      always() &&
      needs.changes.outputs.frontend == 'true' &&
      (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    concurrency:
      group: cd-frontend-${{ inputs.environment || github.ref_name }}
      cancel-in-progress: false

    environment: ${{ (inputs.environment || github.ref_name) == 'prod' && 'production' || 'staging' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [[ "${{ env.TARGET_ENV }}" == "prod" ]]; then
            echo "service=prod-frontend" >> $GITHUB_OUTPUT
            echo "api_service=prod-api" >> $GITHUB_OUTPUT
            echo "tag=prod" >> $GITHUB_OUTPUT
          else
            echo "service=staging-frontend" >> $GITHUB_OUTPUT
            echo "api_service=staging-api" >> $GITHUB_OUTPUT
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Get API URL
        id: api
        run: |
          URL=$(gcloud run services describe "${{ steps.env.outputs.api_service }}" \
            --region="${{ env.REGION }}" --format="value(status.url)" 2>/dev/null || echo "")
          echo "url=${URL}/api/v1" >> $GITHUB_OUTPUT

      - name: Build and push Frontend image
        id: build
        run: |
          IMAGE="${{ env.REGISTRY }}/frontend:${{ github.sha }}"
          IMAGE_ENV="${{ env.REGISTRY }}/frontend:${{ steps.env.outputs.tag }}"

          docker build \
            --target production \
            --build-arg VITE_API_URL="${{ steps.api.outputs.url }}" \
            --build-arg VITE_APP_NAME="VP Dietetic Center" \
            --tag "$IMAGE" \
            --tag "$IMAGE_ENV" \
            --file apps/frontend/Dockerfile \
            .

          docker push "$IMAGE"
          docker push "$IMAGE_ENV"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update "${{ steps.env.outputs.service }}" \
            --image "${{ steps.build.outputs.image }}" \
            --region "${{ env.REGION }}"

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe "${{ steps.env.outputs.service }}" \
            --region "${{ env.REGION }}" --format="value(status.url)")
          echo "Deployed to: ${URL}"

  terraform-apply:
    name: Terraform Apply
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    concurrency:
      group: cd-terraform-${{ inputs.environment || github.ref_name }}
      cancel-in-progress: false

    environment: ${{ (inputs.environment || github.ref_name) == 'prod' && 'production' || 'staging' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -var="db_password_staging=${{ secrets.DB_PASSWORD }}" \
            -var="db_password_prod=${{ secrets.DB_PASSWORD }}"
