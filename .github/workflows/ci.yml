name: CI

on:
  pull_request:
    branches: [staging, prod, main]
  push:
    branches: [staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests with coverage
        run: |
          pnpm --filter api test:coverage
          pnpm --filter @vp/frontend test:coverage

      - name: Build
        run: pnpm build

      - name: Generate Prisma client for API build
        run: pnpm --filter api exec prisma generate

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            apps/api/coverage
            apps/frontend/coverage
          retention-days: 7
