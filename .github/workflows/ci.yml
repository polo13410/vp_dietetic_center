name: CI

on:
  pull_request:
    branches: [staging, prod]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests with coverage
        run: |
          pnpm --filter api test:coverage
          pnpm --filter @vp/frontend test:coverage

      - name: Build
        run: pnpm build

      - name: Generate Prisma client for API build
        run: pnpm --filter api exec prisma generate

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            apps/api/coverage
            apps/frontend/coverage
          retention-days: 7

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      contains(join(github.event.pull_request.labels.*.name, ','), '') ||
      true

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for infra changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^infra/terraform/'; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - uses: hashicorp/setup-terraform@v3
        if: steps.changes.outputs.has_changes == 'true'
        with:
          terraform_version: "1.7.5"

      - name: Authenticate to GCP
        if: steps.changes.outputs.has_changes == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: infra/terraform
        run: terraform init -backend-config="prefix=infra/staging"

      - name: Terraform Validate
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform Plan
        if: steps.changes.outputs.has_changes == 'true'
        id: plan
        working-directory: infra/terraform
        run: |
          terraform plan -no-color \
            -var="env=staging" \
            -var="db_password=placeholder"
        continue-on-error: true

      - name: Comment PR with plan
        uses: actions/github-script@v7
        if: steps.changes.outputs.has_changes == 'true' && github.event_name == 'pull_request'
        with:
          script: |
            const output = `#### Terraform Plan ${{ steps.plan.outcome == 'success' && '✅' || '❌' }}
            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: steps.changes.outputs.has_changes == 'true' && steps.plan.outcome == 'failure'
        run: exit 1

      - name: Skip — no infra changes
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "No changes in infra/terraform — skipping plan"
