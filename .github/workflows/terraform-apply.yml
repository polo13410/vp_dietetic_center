name: Terraform Apply

on:
  push:
    branches: [staging, prod, main]
    paths:
      - 'infra/terraform/**'

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write

    # Production approval required when pushing to prod
    environment: ${{ github.ref_name == 'prod' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.5'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -var="db_password_staging=${{ secrets.DB_PASSWORD }}" \
            -var="db_password_prod=${{ secrets.DB_PASSWORD }}"
