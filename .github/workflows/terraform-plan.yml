name: Terraform Plan

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'infra/terraform/**'

jobs:
  plan:
    name: Terraform Plan — ${{ matrix.env }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    strategy:
      matrix:
        env: [dev, prod]

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.5'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEV }}

      - name: Terraform Init
        working-directory: infra/terraform/envs/${{ matrix.env }}
        run: terraform init

      - name: Terraform Validate
        working-directory: infra/terraform/envs/${{ matrix.env }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: infra/terraform/envs/${{ matrix.env }}
        run: |
          terraform plan -no-color -out=tfplan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID_DEV }}" \
            -var="github_repository=${{ github.repository }}" \
            -var="frontend_url=https://placeholder.run.app" \
            -var="db_password=placeholder" \
            -var="jwt_secret=placeholder-min-32-chars-xxxxxxxx" \
            -var="jwt_refresh_secret=placeholder-min-32-chars-xxxxxxxx"
        continue-on-error: true

      - name: Comment PR with plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const output = `#### Terraform Plan — \`${{ matrix.env }}\` ${{ steps.plan.outcome == 'success' && '✅' || '❌' }}
            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
