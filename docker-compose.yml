version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vp_dietetic
      POSTGRES_USER: vp_user
      POSTGRES_PASSWORD: vp_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vp_user -d vp_dietetic']
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: vp_mailpit
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    logging:
      driver: none

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: vp_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://vp_user:vp_password@postgres:5432/vp_dietetic
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGINS: http://localhost:5173
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: noreply@vp-dietetic.local
      GCS_BUCKET_NAME: vp-dietetic-dev-documents
      GOOGLE_CLOUD_PROJECT: vp-dietetic-dev
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/prisma:/app/prisma
    command: pnpm run dev

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: development
    container_name: vp_frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
      VITE_APP_NAME: 'VP Dietetic Center'
    ports:
      - '5173:5173'
    volumes:
      - ./apps/frontend/src:/app/src
      - ./apps/frontend/public:/app/public

volumes:
  postgres_data:
    driver: local
